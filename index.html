<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S太郎ルート - Hard Boiled Menu</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <aside class="sidebar panel">
        <h1>S太郎<br /><span>- STARO -</span></h1>
        <p class="menu-sub">GAME MENU</p>
        <nav class="menu-list">
          <button class="menu-btn" type="button">はじめから</button>
          <button class="menu-btn" type="button">つづきから</button>
          <button class="menu-btn" type="button">相棒の管理</button>
          <button class="menu-btn" type="button">秘書の管理</button>
          <button class="menu-btn" type="button">クレジット</button>
        </nav>
      </aside>

      <section class="hero panel">
        <div class="hud">
          <p>信頼度: <span id="trust">0</span></p>
          <button id="bgm-toggle" type="button">BGM再生</button>
        </div>
        <img id="character-image" class="hero__image" src="" alt="S太郎の立ち絵" />

        <article class="dialogue-box">
          <h2 id="speaker">S太郎</h2>
          <p id="line"></p>
        </article>
      </section>

      <aside class="info-col">
        <section class="panel info-card">
          <h3>- S太郎 PROFILE -</h3>
          <ul>
            <li><b>年齢</b><span>不明</span></li>
            <li><b>職業</b><span>芸術家</span></li>
            <li><b>性格</b><span>口は悪いが情は深い</span></li>
            <li><b>趣味</b><span>葉巻・ワイン・鑑賞</span></li>
          </ul>
          <p class="quote">「俺の時間を、邪魔するなよ。」</p>
        </section>

        <section class="panel info-card">
          <h3>- STATUS -</h3>
          <ul>
            <li><b>名声</b><span>★★★★★</span></li>
            <li><b>資産</b><span>¥ 5,000,000,000</span></li>
            <li><b>余裕</b><span>100%</span></li>
            <li><b>人気</b><span>絶対的</span></li>
          </ul>
        </section>
      </aside>

      <section class="choices-wrap panel">
        <div id="choices" class="choices"></div>
      </section>
    </main>

    <audio id="bgm" src="./assets/music/bgm.mp3" loop></audio>
    <script src="./script.js" defer></script>
  </body>
</html>
